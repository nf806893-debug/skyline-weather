<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyline Weather</title>
    
    <!-- Minimal SVG Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2338bdf8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M12 2v2'/><path d='m4.93 4.93 1.41 1.41'/><path d='M20 12h2'/><path d='m19.07 4.93-1.41 1.41'/><path d='M15.947 12.65a4 4 0 0 0-5.925-4.128'/><path d='M13 22H7a5 5 0 1 1 4.9-6H13a3 3 0 0 1 0 6Z'/></svg>">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --bg-base: #0f172a;
            --sidebar-bg: rgba(15, 23, 42, 0.6);
            --panel-bg: rgba(30, 41, 59, 0.6);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --radius-lg: 24px;
            --radius-md: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg-base); color: var(--text-main); min-height: 100vh; display: flex; overflow: hidden; }
        .app-container { display: flex; width: 100%; height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 320px; background: var(--sidebar-bg); backdrop-filter: blur(20px); border-right: 1px solid var(--panel-border); padding: 2rem; display: flex; flex-direction: column; }
        .sidebar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        .settings-toggle-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--panel-border); color: var(--text-main); padding: 0.5rem; border-radius: 8px; cursor: pointer; display: flex; }
        /* Removed Tilt/Transform on hover */
        .settings-toggle-btn:hover { background: rgba(255, 255, 255, 0.1); border-color: var(--accent); }

        .search-box { position: relative; margin-bottom: 1.5rem; }
        .search-box input { width: 100%; padding: 0.8rem 1rem 0.8rem 2.5rem; background: rgba(255,255,255,0.05); border: 1px solid var(--panel-border); border-radius: 12px; color: white; }
        
        /* Forecast with invisible scrollbar */
        .forecast-container { display: flex; gap: 1rem; overflow-x: auto; padding-bottom: 1rem; width: 100%; }
        .forecast-container::-webkit-scrollbar { display: none; }
        .forecast-container { -ms-overflow-style: none; scrollbar-width: none; }
        
        .forecast-card { min-width: 120px; background: var(--panel-bg); border: 1px solid var(--panel-border); padding: 1.25rem 1rem; border-radius: var(--radius-md); text-align: center; }
        
        .main-content { flex: 1; padding: 3rem; overflow-y: auto; }
        .preview-banner { display: none; padding: 1rem; background: var(--accent); color: #000; border-radius: 12px; margin-bottom: 2rem; justify-content: space-between; align-items: center; }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: var(--panel-bg); padding: 2rem; border-radius: var(--radius-lg); border: 1px solid var(--panel-border); text-align: center; max-width: 360px; }
    </style>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Skyline</h2>
                <div style="display:flex; gap:0.5rem;">
                    <button class="settings-toggle-btn" id="infoToggleBtn"><i data-lucide="info"></i></button>
                    <button class="settings-toggle-btn" id="settingsToggleBtn"><i data-lucide="settings"></i></button>
                </div>
            </div>
            <div class="search-box">
                <i data-lucide="search" style="position:absolute; left:10px; top:12px; color:var(--text-muted);"></i>
                <input type="text" id="cityInput" placeholder="Search city...">
            </div>
            <ul id="cityList" style="list-style:none;"></ul>
        </aside>

        <main class="main-content">
            <div id="previewBanner" class="preview-banner">
                <span>Previewing Location</span>
                <button id="addPreviewBtn" style="padding:0.5rem 1rem; border-radius:8px; border:none; cursor:pointer;">Add to Dashboard</button>
            </div>
            <h1 id="cityName">Searching for location...</h1>
            <div style="margin: 2rem 0;">
                <h3 style="margin-bottom: 1rem;">7-Day Forecast</h3>
                <div class="forecast-container" id="forecastContainer"></div>
            </div>
        </main>
    </div>

    <!-- Info Modal -->
    <div id="infoModal" class="modal-overlay">
        <div class="modal-content">
            <h3>Skyline Weather</h3>
            <p style="margin: 1rem 0;">This application was created by <strong>Gemini</strong>.</p>
            <button id="closeInfoBtn" style="padding:0.5rem 2rem; cursor:pointer;">Close</button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        // Location logic
        navigator.geolocation.getCurrentPosition(pos => {
            fetchWeather(pos.coords.latitude, pos.coords.longitude, "My Location");
        });

        async function fetchWeather(lat, lon, name) {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=temperature_2m_max,weathercode&timezone=auto`;
            const res = await fetch(url);
            const data = await res.json();
            
            document.getElementById('cityName').innerText = name;
            const container = document.getElementById('forecastContainer');
            container.innerHTML = '';
            
            data.daily.time.forEach((time, i) => {
                const card = document.createElement('div');
                card.className = 'forecast-card';
                card.innerHTML = `<p>${new Date(time).toLocaleDateString('en-US', {weekday: 'short'})}</p><h4>${data.daily.temperature_2m_max[i]}°</h4>`;
                container.appendChild(card);
            });
        }

        document.getElementById('cityInput').addEventListener('keypress', async (e) => {
            if(e.key === 'Enter') {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${e.target.value}&limit=1`);
                const data = await res.json();
                if(data[0]) {
                    document.getElementById('previewBanner').style.display = 'flex';
                    fetchWeather(data[0].lat, data[0].lon, data[0].display_name.split(',')[0]);
                }
            }
        });

        document.getElementById('infoToggleBtn').addEventListener('click', () => document.getElementById('infoModal').style.display = 'flex');
        document.getElementById('closeInfoBtn').addEventListener('click', () => document.getElementById('infoModal').style.display = 'none');
    </script>
</body>
</html>
