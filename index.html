<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skyline Weather Ultra</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2338bdf8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M12 2v2'/><path d='m4.93 4.93 1.41 1.41'/><path d='M20 12h2'/><path d='m19.07 4.93-1.41 1.41'/><path d='M15.947 12.65a4 4 0 0 0-5.925-4.128'/><path d='M13 22H7a5 5 0 1 1 4.9-6H13a3 3 0 0 1 0 6Z'/></svg>">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Chart.js for Trend Analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --bg-base: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.6);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #38bdf8;
            --radius-lg: 24px;
            --radius-md: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: #0f172a; color: var(--text-main); min-height: 100vh; display: flex; overflow: hidden; }
        
        .sidebar { width: 320px; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border-right: 1px solid var(--panel-border); padding: 2rem; display: flex; flex-direction: column; }
        .main-content { flex: 1; padding: 3rem; overflow-y: auto; }
        
        .search-box { margin-bottom: 2rem; position: relative; }
        .search-box input { width: 100%; padding: 0.8rem 1rem 0.8rem 2.5rem; background: rgba(255,255,255,0.05); border: 1px solid var(--panel-border); border-radius: 12px; color: white; }
        
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin: 2rem 0; }
        .stat-card { background: var(--panel-bg); padding: 1.5rem; border-radius: var(--radius-md); border: 1px solid var(--panel-border); }
        .stat-card p { font-size: 0.8rem; color: var(--text-muted); }
        .stat-card h3 { font-size: 1.2rem; margin-top: 0.5rem; }
        
        .chart-container { background: var(--panel-bg); padding: 2rem; border-radius: var(--radius-lg); border: 1px solid var(--panel-border); height: 300px; }
        
        .btn { cursor: pointer; padding: 0.6rem 1.2rem; border-radius: 8px; border: none; background: var(--accent); color: #000; font-weight: 600; }
        .settings-btn { background: none; border: 1px solid var(--panel-border); color: white; padding: 0.5rem; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 2rem;">
            <h2>Skyline</h2>
            <div style="display:flex; gap:0.5rem;">
                <button class="settings-btn" id="infoBtn"><i data-lucide="info"></i></button>
                <button class="settings-btn"><i data-lucide="settings"></i></button>
            </div>
        </div>
        <div class="search-box">
            <i data-lucide="search" style="position:absolute; left:10px; top:12px; color:var(--text-muted);"></i>
            <input type="text" id="cityInput" placeholder="Search city...">
        </div>
        <ul id="cityList" style="list-style:none;"></ul>
    </aside>

    <main class="main-content">
        <div id="previewBanner" style="display:none; padding:1rem; background:var(--accent); color:#000; border-radius:12px; margin-bottom:2rem; justify-content:space-between; align-items:center;">
            <span>Preview Mode</span>
            <button class="btn" id="addBtn">Add to Dashboard</button>
        </div>

        <h1 id="cityName">Initializing...</h1>
        
        <div class="stat-grid">
            <div class="stat-card"><p>Humidity</p><h3 id="statHum">--</h3></div>
            <div class="stat-card"><p>Wind Speed</p><h3 id="statWind">--</h3></div>
            <div class="stat-card"><p>Pressure</p><h3 id="statPres">--</h3></div>
            <div class="stat-card"><p>UV Index</p><h3 id="statUV">--</h3></div>
        </div>

        <div class="chart-container">
            <canvas id="weatherChart"></canvas>
        </div>
    </main>

    <script>
        let myChart;
        lucide.createIcons();

        function initChart(temps) {
            const ctx = document.getElementById('weatherChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'],
                    datasets: [{
                        data: temps,
                        borderColor: '#38bdf8',
                        backgroundColor: 'rgba(56, 189, 248, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        async function fetchWeather(lat, lon, name) {
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=relative_humidity_2m,wind_speed_10m,pressure_msl&daily=temperature_2m_max&timezone=auto`);
            const data = await res.json();
            
            document.getElementById('cityName').innerText = name;
            document.getElementById('statHum').innerText = data.current.relative_humidity_2m + "%";
            document.getElementById('statWind').innerText = data.current.wind_speed_10m + " km/h";
            document.getElementById('statPres').innerText = data.current.pressure_msl + " hPa";
            document.getElementById('statUV').innerText = "Moderate"; // Placeholder
            
            initChart(data.daily.temperature_2m_max);
        }

        // Automatic Location
        navigator.geolocation.getCurrentPosition(pos => {
            fetchWeather(pos.coords.latitude, pos.coords.longitude, "My Location");
        });

        document.getElementById('cityInput').addEventListener('keypress', async (e) => {
            if(e.key === 'Enter') {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${e.target.value}`);
                const data = await res.json();
                if(data[0]) {
                    document.getElementById('previewBanner').style.display = 'flex';
                    fetchWeather(data[0].lat, data[0].lon, data[0].display_name.split(',')[0]);
                }
            }
        });
    </script>
</body>
</html>
